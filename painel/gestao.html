<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Campanha — Henrichs Consultoria</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--card2:#1c2330;--border:#2d333b;--tx:#e6edf3;--tx2:#8b949e;--ac:#2f81f7;--ok:#3fb950;--warn:#d29922;--bad:#f85149}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font:14px/1.5 -apple-system,'Segoe UI',Roboto,sans-serif}
header{display:flex;align-items:center;gap:12px;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;z-index:50}
header .logo{width:34px;height:34px;border-radius:8px;background:var(--ok);display:flex;align-items:center;justify-content:center;font-weight:700}
header h1{font-size:15px}
header small{color:var(--tx2);display:block;font-weight:400}
nav{display:flex;gap:4px;padding:10px 22px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg);position:sticky;top:63px;z-index:49}
nav button,nav a{background:none;border:1px solid transparent;color:var(--tx2);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13.5px;text-decoration:none}
nav button.on{background:var(--card2);color:var(--tx);border-color:var(--border)}
main{padding:20px 22px;max-width:1400px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:18px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.card .v{font-size:20px;font-weight:700;margin:2px 0}
.card .l{color:var(--tx2);font-size:12.5px}
.tools{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap;align-items:center}
input,select,textarea{background:var(--card);border:1px solid var(--border);color:var(--tx);padding:8px 12px;border-radius:8px;font-size:13.5px;outline:none}
textarea{width:100%;min-height:60px}
button.b{background:var(--ac);border:none;color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:600}
button.b2{background:var(--card2);border:1px solid var(--border);color:var(--tx);padding:8px 14px;border-radius:8px;cursor:pointer}
button.bd{background:none;border:1px solid var(--bad);color:var(--bad);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:10px;overflow:hidden;font-size:13.5px}
th{background:var(--card2);text-align:left;padding:9px 12px;color:var(--tx2);font-weight:600;white-space:nowrap}
th.num,td.num{text-align:right}
td{padding:8px 12px;border-top:1px solid var(--border)}
tbody tr:hover{background:var(--card2)}
.tag{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11.5px;background:var(--card2);border:1px solid var(--border)}
.pos{color:var(--ok)}.neg{color:var(--bad)}.mut{color:var(--tx2)}
.sub{color:var(--tx2);font-size:12.5px;margin:16px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:flex-start;justify-content:center;z-index:2000;padding:40px 16px;overflow:auto}
.modal.on{display:flex}
.box{background:var(--card);border:1px solid var(--border);border-radius:12px;max-width:820px;width:100%;padding:22px}
.box .x{float:right;background:none;border:none;color:var(--tx2);font-size:20px;cursor:pointer}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:10px 0}
@media(max-width:760px){.grid2,.grid3{grid-template-columns:1fr}}
.aviso{background:#3b2e12;border:1px solid var(--warn);color:#e3b341;border-radius:8px;padding:10px 14px;margin:10px 0;font-size:13px}
.nivel{display:inline-block;padding:1px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
label{font-size:12px;color:var(--tx2);display:block;margin-bottom:2px}
.fld{display:flex;flex-direction:column}
.fld input,.fld select{width:100%}
@media print{body *{visibility:hidden}#imprimivel,#imprimivel *{visibility:visible}#imprimivel{position:absolute;left:0;top:0;width:100%;background:#fff;color:#000;padding:40px;font:13px/1.7 Georgia,serif}}
</style>
</head>
<body>
<header>
  <div class="logo">G</div>
  <div style="flex:1"><h1>Gestão de Campanha</h1><small>dados salvos neste navegador — faça backup regularmente</small></div>
  <button class="b2" onclick="backup()">💾 Backup</button>
  <label class="b2" style="cursor:pointer;padding:8px 14px">📂 Restaurar<input type="file" accept=".json" hidden onchange="restaurar(this)"></label>
  <a href="index.html" class="b2" style="padding:8px 14px">← Painel de dados</a>
</header>
<nav id="nav">
  <button data-t="dash" class="on">📊 Resumo</button>
  <button data-t="apoio">🤝 Apoiadores</button>
  <button data-t="org">🧭 Organograma</button>
  <button data-t="equipe">🚗 Equipes</button>
  <button data-t="comp">📌 Compromissos</button>
  <button data-t="agenda">📅 Agenda</button>
  <button data-t="metas">🎯 Metas</button>
  <button data-t="evt">🗓️ Eventos</button>
  <button data-t="diad">🗳️ Dia D</button>
  <button data-t="midia">📻 Mídia Local</button>
  <button data-t="crise">🚨 Crises</button>
  <button data-t="docs">📄 Termos & Contratos</button>
  <button data-t="fin">💰 Financeiro</button>
  <button data-t="mat">📦 Materiais</button>
  <button data-t="normas">📖 Normas</button>
</nav>
<main>
  <section id="t-dash"></section>
  <section id="t-apoio" hidden></section>
  <section id="t-org" hidden></section>
  <section id="t-comp" hidden></section>
  <section id="t-agenda" hidden></section>
  <section id="t-metas" hidden></section>
  <section id="t-evt" hidden></section>
  <section id="t-diad" hidden></section>
  <section id="t-midia" hidden></section>
  <section id="t-crise" hidden></section>
  <section id="t-normas" hidden></section>
  <section id="t-equipe" hidden></section>
  <section id="t-docs" hidden></section>
  <section id="t-fin" hidden></section>
  <section id="t-mat" hidden></section>
</main>
<div class="modal" id="modal"><div class="box" id="modal-box"></div></div>
<div id="imprimivel" style="display:none"></div>
<script>
/* ═══════════ base ═══════════ */
const byId=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt=v=>'R$ '+(+v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const hoje=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const DB={
  get:k=>{try{return JSON.parse(localStorage.getItem('hc_'+k))||[];}catch(e){return[];}},
  set:(k,v)=>localStorage.setItem('hc_'+k,JSON.stringify(v)),
  obj:k=>{try{return JSON.parse(localStorage.getItem('hc_'+k))||{};}catch(e){return{};}},
};
let CIDADES=[];
const UF=(localStorage.getItem('hc_uf')||'sc');
fetch(`data/${UF}.json`).then(r=>r.json()).then(d=>{CIDADES=d.municipios.map(m=>({nome:m.nome,meso:m.meso}));rAll();}).catch(()=>rAll());

function backup(){
  const tudo={};['apoiadores','equipes','documentos','despesas','receitas','materiais','distribuicoes','planejamento',
    'organograma','compromissos','agenda','ligacoes','metas','metasCfg','relatorios','eventos','fiscais','midias','crises','visibilidade']
    .forEach(k=>tudo[k]=DB.get(k).length?DB.get(k):DB.obj(k));
  const blob=new Blob([JSON.stringify(tudo,null,1)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`backup_campanha_${hoje()}.json`;a.click();
}
function restaurar(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    Object.entries(d).forEach(([k,v])=>DB.set(k,v));alert('Backup restaurado.');rAll();
  }catch(e){alert('Arquivo inválido.');}};
  r.readAsText(f);
}
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  document.querySelectorAll('main section').forEach(s=>s.hidden=true);
  byId('t-'+b.dataset.t).hidden=false;
});
byId('modal').onclick=e=>{if(e.target.id==='modal')fechar();};
function fechar(){byId('modal').classList.remove('on');}
function abrir(html){byId('modal-box').innerHTML=`<button class="x" onclick="fechar()">✕</button>`+html;byId('modal').classList.add('on');}
const selCidade=(id,val='')=>`<select id="${id}"><option value="">— cidade —</option>${CIDADES.map(c=>`<option ${c.nome===val?'selected':''}>${esc(c.nome)}</option>`).join('')}</select>`;
function rAll(){rDash();rApoio();rOrg();rEquipe();rComp();rAgenda();rMetas();rEvt();rDiaD();rMidia();rCrise();rDocs();rFin();rMat();rNormas();}

/* ═══════════ Apoiadores ═══════════ */
// Escala de importância (adaptada de metodologias de organização de base/community organizing)
const NIVEIS={
  5:{rot:'⭐ Multiplicador',cor:'#f85149',desc:'lidera rede própria: vereador, presidente de associação, líder comunitário/religioso, empresário com equipe'},
  4:{rot:'Mobilizador',cor:'#d29922',desc:'traz outras pessoas: organiza eventos, arregimenta voluntários'},
  3:{rot:'Voluntário ativo',cor:'#2f81f7',desc:'trabalha na campanha: distribui material, dirige, faz bandeiraço'},
  2:{rot:'Simpatizante',cor:'#3fb950',desc:'declara voto e divulga nas redes/círculo próximo'},
  1:{rot:'Contato',cor:'#8b949e',desc:'cadastrado, ainda sem engajamento confirmado'},
};
const tagNivel=n=>{const x=NIVEIS[n]||NIVEIS[1];return `<span class="nivel" style="border:1px solid ${x.cor};color:${x.cor}">${x.rot}</span>`;};

function rApoio(){
  const lista=DB.get('apoiadores');
  byId('t-apoio').innerHTML=`
  <datalist id="dl-aps">${lista.map(a=>`<option>${esc(a.nome)}</option>`).join('')}</datalist>
  <div class="tools">
    <button class="b" onclick="formApoiador()">+ Novo apoiador</button>
    <label class="b2" style="cursor:pointer">📊 Importar Excel<input type="file" accept=".xlsx,.xls,.csv" hidden onchange="importarXlsx(this)"></label>
    <button class="b2" onclick="exportarApoiadores()">⬇️ Exportar</button>
    <input type="search" id="q-ap" placeholder="Buscar…" oninput="rApoioTb()">
    <select id="f-ap-cidade" onchange="rApoioTb()"><option value="">Todas as cidades</option>
    ${[...new Set(lista.map(a=>a.cidade).filter(Boolean))].sort().map(c=>`<option>${esc(c)}</option>`).join('')}</select>
    <select id="f-ap-nivel" onchange="rApoioTb()"><option value="">Todos os níveis</option>
    ${[5,4,3,2,1].map(n=>`<option value="${n}">${NIVEIS[n].rot}</option>`).join('')}</select>
  </div>
  <div class="mut" style="font-size:12.5px;margin-bottom:8px">Escala: ${[5,4,3,2,1].map(n=>`<b style="color:${NIVEIS[n].cor}">${NIVEIS[n].rot}</b> = ${NIVEIS[n].desc}`).join(' · ')}</div>
  <div id="tb-apoio"></div>`;
  rApoioTb();
}
function rApoioTb(){
  const lista=DB.get('apoiadores');
  const q=(byId('q-ap')?.value||'').toLowerCase(),fc=byId('f-ap-cidade')?.value||'',fn=byId('f-ap-nivel')?.value||'';
  const rows=lista.filter(a=>(!q||`${a.nome} ${a.cidade} ${a.telefone}`.toLowerCase().includes(q))
    &&(!fc||a.cidade===fc)&&(!fn||String(a.nivel)===fn))
    .sort((a,b)=>(b.nivel||0)-(a.nivel||0)||a.nome.localeCompare(b.nome));
  byId('tb-apoio').innerHTML=`<table><thead><tr><th>Nome</th><th>Nível</th><th>Telefone</th><th>WhatsApp</th>
  <th>E-mail</th><th>Cidade</th><th>Função</th><th></th></tr></thead><tbody>
  ${rows.map(a=>`<tr><td><b>${esc(a.nome)}</b></td><td>${tagNivel(a.nivel)}</td>
  <td>${esc(a.telefone||'—')}</td>
  <td>${a.whatsapp?`<a href="https://wa.me/55${String(a.whatsapp).replace(/\D/g,'')}" target="_blank" style="color:var(--ok)">${esc(a.whatsapp)}</a>`:'—'}</td>
  <td class="mut">${esc(a.email||'—')}</td><td>${esc(a.cidade||'—')}</td><td class="mut">${esc(a.funcao||'—')}</td>
  <td><button class="b2" style="padding:3px 10px;font-size:12px" onclick="formApoiador('${a.id}')">editar</button>
  <button class="bd" onclick="delApoiador('${a.id}')">×</button></td></tr>`).join('')}</tbody></table>
  <div class="mut" style="margin-top:6px">${rows.length} de ${lista.length} apoiadores.</div>`;
}
function formApoiador(id){
  const a=DB.get('apoiadores').find(x=>x.id===id)||{};
  abrir(`<h2>${id?'Editar':'Novo'} apoiador</h2>
  <div class="grid2">
    <div class="fld"><label>Nome *</label><input id="ap-nome" value="${esc(a.nome||'')}"></div>
    <div class="fld"><label>Telefone *</label><input id="ap-tel" value="${esc(a.telefone||'')}"></div>
    <div class="fld"><label>WhatsApp *</label><input id="ap-zap" value="${esc(a.whatsapp||'')}"></div>
    <div class="fld"><label>E-mail *</label><input id="ap-email" value="${esc(a.email||'')}"></div>
    <div class="fld"><label>Cidade *</label>${selCidade('ap-cidade',a.cidade)}</div>
    <div class="fld"><label>Bairro</label><input id="ap-bairro" value="${esc(a.bairro||'')}"></div>
    <div class="fld"><label>Função na campanha</label><input id="ap-funcao" value="${esc(a.funcao||'')}" placeholder="motorista, coordenador de bairro…"></div>
    <div class="fld"><label>Data de nascimento</label><input id="ap-nasc" type="date" value="${esc(a.nasc||'')}"></div>
    <div class="fld"><label>Nível de importância</label><select id="ap-nivel">
    ${[5,4,3,2,1].map(n=>`<option value="${n}" ${a.nivel==n?'selected':''}>${NIVEIS[n].rot} — ${NIVEIS[n].desc}</option>`).join('')}</select></div>
  </div>
  <div class="fld"><label>Observações</label><textarea id="ap-obs">${esc(a.obs||'')}</textarea></div>
  <button class="b" style="margin-top:10px" onclick="salvarApoiador('${id||''}')">Salvar</button>`);
}
function salvarApoiador(id){
  const v=k=>byId('ap-'+k).value.trim();
  if(!v('nome')||!v('tel')||!v('zap')||!v('email')||!v('cidade'))return alert('Preencha os campos obrigatórios: nome, telefone, WhatsApp, e-mail e cidade.');
  const lista=DB.get('apoiadores');
  const novo={id:id||uid(),nome:v('nome'),telefone:v('tel'),whatsapp:v('zap'),email:v('email'),
    cidade:v('cidade'),bairro:v('bairro'),funcao:v('funcao'),nasc:byId('ap-nasc').value,nivel:+byId('ap-nivel').value,obs:byId('ap-obs').value,criado:id?(lista.find(x=>x.id===id)?.criado||hoje()):hoje()};
  const i=lista.findIndex(x=>x.id===id);
  if(i>=0)lista[i]=novo;else lista.push(novo);
  DB.set('apoiadores',lista);fechar();rApoio();rDash();
}
function delApoiador(id){if(!confirm('Remover apoiador?'))return;DB.set('apoiadores',DB.get('apoiadores').filter(x=>x.id!==id));rApoio();rDash();}
function exportarApoiadores(){
  const ws=XLSX.utils.json_to_sheet(DB.get('apoiadores').map(a=>({Nome:a.nome,Nível:NIVEIS[a.nivel]?.rot,Telefone:a.telefone,WhatsApp:a.whatsapp,Email:a.email,Cidade:a.cidade,Bairro:a.bairro,Função:a.funcao,Obs:a.obs})));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Apoiadores');
  XLSX.writeFile(wb,`apoiadores_${hoje()}.xlsx`);
}
/* importação com mapeamento automático de colunas */
const MAPA_COLUNAS={
  nome:['nome','name','apoiador','contato'],
  telefone:['telefone','tel','fone','celular','phone'],
  whatsapp:['whatsapp','whats','zap','wpp'],
  email:['email','e-mail','mail'],
  cidade:['cidade','municipio','município','city'],
  bairro:['bairro','distrito'],
  funcao:['funcao','função','cargo','papel','atividade'],
  obs:['obs','observacao','observação','observacoes','notas'],
  nasc:['nascimento','aniversario','aniversário','data de nascimento','nasc','dt_nasc'],
};
function importarXlsx(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const linhas=XLSX.utils.sheet_to_json(ws,{defval:''});
    if(!linhas.length)return alert('Planilha vazia.');
    const cols=Object.keys(linhas[0]);
    const norm=s=>String(s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim();
    const auto={};
    Object.entries(MAPA_COLUNAS).forEach(([campo,alts])=>{
      const achou=cols.find(c=>alts.some(a=>norm(c).includes(a)||a.includes(norm(c))));
      if(achou)auto[campo]=achou;
    });
    // telefone vira whatsapp se não houver coluna própria
    abrir(`<h2>Importar ${linhas.length} linhas</h2>
    <div class="mut" style="margin-bottom:8px">Confira o mapeamento das colunas (detectado automaticamente):</div>
    <div class="grid2">${Object.keys(MAPA_COLUNAS).map(campo=>`
      <div class="fld"><label>${campo}${['nome','telefone','whatsapp','email','cidade'].includes(campo)?' *':''}</label>
      <select id="map-${campo}"><option value="">— ignorar —</option>
      ${cols.map(c=>`<option ${auto[campo]===c?'selected':''}>${esc(c)}</option>`).join('')}</select></div>`).join('')}
    </div>
    <div class="fld"><label>Nível padrão para importados</label><select id="map-nivel">
    ${[1,2,3,4,5].map(n=>`<option value="${n}">${NIVEIS[n].rot}</option>`).join('')}</select></div>
    <div class="aviso">Se a planilha não tiver coluna de WhatsApp, o telefone será usado como WhatsApp.</div>
    <button class="b" onclick="confirmarImport()">Importar</button>`);
    window._imp={linhas};
  };
  r.readAsArrayBuffer(f);inp.value='';
}
function confirmarImport(){
  const {linhas}=window._imp;
  const mapa={};Object.keys(MAPA_COLUNAS).forEach(c=>mapa[c]=byId('map-'+c).value);
  if(!mapa.nome)return alert('Mapeie ao menos a coluna de nome.');
  const nivel=+byId('map-nivel').value;
  const lista=DB.get('apoiadores');
  const jaTem=new Set(lista.map(a=>a.nome.toLowerCase()+'|'+(a.cidade||'').toLowerCase()));
  let add=0,dup=0,semObrig=0;
  linhas.forEach(l=>{
    const g=c=>mapa[c]?String(l[mapa[c]]||'').trim():'';
    const nome=g('nome');if(!nome)return;
    const tel=g('telefone'),zap=g('whatsapp')||tel,email=g('email'),cidade=g('cidade');
    if(!tel&&!zap){semObrig++;}
    const chave=nome.toLowerCase()+'|'+cidade.toLowerCase();
    if(jaTem.has(chave)){dup++;return;}
    jaTem.add(chave);
    let nasc=g('nasc');
    if(nasc&&/^\d{2}\/\d{2}\/\d{4}$/.test(nasc))nasc=nasc.split('/').reverse().join('-');
    lista.push({id:uid(),nome,telefone:tel,whatsapp:zap,email,cidade,bairro:g('bairro'),
      funcao:g('funcao'),obs:g('obs'),nasc,nivel,criado:hoje()});
    add++;
  });
  DB.set('apoiadores',lista);fechar();rApoio();rDash();
  alert(`Importados: ${add}\nDuplicados ignorados: ${dup}\nSem telefone (importados mesmo assim, completar depois): ${semObrig}`);
}

/* ═══════════ Equipes ═══════════ */
function rEquipe(){
  const eqs=DB.get('equipes'),aps=DB.get('apoiadores');
  byId('t-equipe').innerHTML=`
  <div class="tools"><button class="b" onclick="formEquipe()">+ Nova equipe</button></div>
  ${eqs.length?'':'<div class="mut">Nenhuma equipe. Crie a primeira — ex.: "Carro 1 — Oeste", com responsável e 4 membros.</div>'}
  <div class="cards" style="grid-template-columns:repeat(auto-fill,minmax(320px,1fr))">
  ${eqs.map(e=>`<div class="card">
    <div style="display:flex;justify-content:space-between"><b>${e.tipo==='carro'?'🚗':e.tipo==='base'?'🏠':'📣'} ${esc(e.nome)}</b>
    <span><button class="b2" style="padding:2px 8px;font-size:12px" onclick="formEquipe('${e.id}')">editar</button>
    <button class="bd" onclick="delEquipe('${e.id}')">×</button></span></div>
    ${e.veiculo?.modelo?`<div class="mut" style="font-size:12.5px">${esc(e.veiculo.modelo)} · placa ${esc(e.veiculo.placa||'—')} · dono: ${esc(e.veiculo.proprietario||'—')}

/* anexos comprimidos em base64 (fotos de documentos assinados, notas etc.) */
function anexarDoc(id,inp){
  const f=inp.files[0];if(!f)return;
  if(f.type==='application/pdf'&&f.size>2e6)return alert('PDF acima de 2MB — reduza antes de anexar.');
  const fim=b64=>{
    const docs=DB.get('documentos');const d=docs.find(x=>x.id===id);
    d.anexos=d.anexos||[];d.anexos.push({nome:f.name,tipo:f.type,b64,data:hoje()});
    try{DB.set('documentos',docs);}catch(e){return alert('Espaço do navegador cheio — faça backup e remova anexos antigos.');}
    rDocs();
  };
  if(f.type.startsWith('image/')){
    const img=new Image();
    img.onload=()=>{const cv=document.createElement('canvas');
      const esc2=Math.min(1,1200/Math.max(img.width,img.height));
      cv.width=img.width*esc2;cv.height=img.height*esc2;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      fim(cv.toDataURL('image/jpeg',.8));};
    img.src=URL.createObjectURL(f);
  }else{const r=new FileReader();r.onload=()=>fim(r.result);r.readAsDataURL(f);}
  inp.value='';
}

const CATEGORIAS=['Pessoal/Contratações','Combustível','Material gráfico','Carros de som/Serviços','Publicidade digital','Eventos','Alimentação','Aluguel/Estrutura','Outros'];
function rFin(){
  const desp=DB.get('despesas'),rec=DB.get('receitas'),plano=DB.obj('planejamento');
  const totD=desp.reduce((a,d)=>a+d.valor,0),totR=rec.reduce((a,r)=>a+r.valor,0);

  byId('t-fin').innerHTML=`
  <div class="cards">
    <div class="card"><div class="l">Entradas (receitas)</div><div class="v pos">${fmt(totR)}</div><div class="l">${rec.length} lançamentos</div></div>

    <div class="card"><div class="l">Saldo</div><div class="v ${totR-totD>=0?'pos':'neg'}">${fmt(totR-totD)}</div><div class="l">compensação entradas − saídas</div></div>
    <div class="card"><div class="l">Orçamento planejado</div><div class="v">${plano.total?fmt(plano.total):'—'}</div>
    <div class="l">${plano.total?(totD/plano.total*100).toFixed(1)+'% executado':'defina no planejamento'}</div></div>
  </div>
  <div class="tools">
    <button class="b" onclick="formDespesa()">+ Despesa</button>
    <button class="b" style="background:var(--ok)" onclick="formReceita()">+ Entrada</button>
    <button class="b2" onclick="formPlanejamento()">🎯 Planejamento (%)</button>
  </div>
  <div class="sub">Planejado × executado por categoria</div>
  <table><thead><tr><th>Categoria</th><th class="num">Planejado</th><th class="num">Gasto</th><th class="num">% do plano</th><th style="width:35%"></th></tr></thead><tbody>
  ${CATEGORIAS.map(c=>{
    const plan=plano.total?plano.total*(plano.pct?.[c]||0)/100:0;
    const gasto=porCat[c]||0;const p=plan?gasto/plan*100:0;
    return `<tr><td>${c} ${plano.pct?.[c]?`<span class="mut">(${plano.pct[c]}%)</span>`:''}</td>
    <td class="num mut">${plan?fmt(plan):'—'}</td><td class="num">${fmt(gasto)}</td>
    <td class="num ${p>100?'neg':p>80?'':'pos'}">${plan?p.toFixed(0)+'%':'—'}</td>
    <td><div style="background:var(--card2);border-radius:4px;height:10px;overflow:hidden">
    <div style="height:10px;width:${Math.min(p,100)}%;background:${p>100?'var(--bad)':p>80?'var(--warn)':'var(--ok)'}"></div></div></td></tr>`;
  }).join('')}</tbody></table>
  <div class="sub">Evolução dos gastos (acumulado por mês)</div>
  <div class="card">${graficoEvolucao(desp,rec)}</div>
  <div class="sub">Despesas</div>

  <td><span class="tag">${esc(r.tipo)}</span></td><td>${esc(r.origem)}</td><td class="mut">${esc(r.doc||'—')}</td>

function graficoEvolucao(desp,rec){
  const meses={};
  desp.forEach(d=>{const m=d.data.slice(0,7);meses[m]=meses[m]||{d:0,r:0};meses[m].d+=d.valor;});
  rec.forEach(r=>{const m=r.data.slice(0,7);meses[m]=meses[m]||{d:0,r:0};meses[m].r+=r.valor;});
  const ks=Object.keys(meses).sort();
  if(ks.length<1)return '<span class="mut">Lance despesas e entradas para ver a evolução.</span>';
  let accD=0,accR=0;
  const pts=ks.map(k=>{accD+=meses[k].d;accR+=meses[k].r;return{k,d:accD,r:accR};});
  const W=760,H=200,max=Math.max(...pts.map(p=>Math.max(p.d,p.r)),1);
  const x=i=>40+(W-60)*(pts.length===1?0.5:i/(pts.length-1));
  const y=v=>H-24-(H-44)*(v/max);
  const linha=(cor,ch)=>`<polyline fill="none" stroke="${cor}" stroke-width="2.5" points="${pts.map((p,i)=>`${x(i)},${y(p[ch])}`).join(' ')}"/>`
    +pts.map((p,i)=>`<circle cx="${x(i)}" cy="${y(p[ch])}" r="3.5" fill="${cor}"><title>${p.k}: ${fmt(p[ch])}</title></circle>`).join('');
  return `<svg width="100%" viewBox="0 0 ${W} ${H}">
  ${linha('#f85149','d')}${linha('#3fb950','r')}
  ${pts.map((p,i)=>`<text x="${x(i)}" y="${H-6}" fill="#8b949e" font-size="10" text-anchor="middle">${p.k.slice(5)}/${p.k.slice(2,4)}</text>`).join('')}
  </svg>
  <div style="display:flex;gap:16px;font-size:12.5px"><span><i style="display:inline-block;width:12px;height:3px;background:#f85149;vertical-align:middle"></i> despesas acumuladas</span>
  <span><i style="display:inline-block;width:12px;height:3px;background:#3fb950;vertical-align:middle"></i> entradas acumuladas</span></div>`;
}

function rCompTb(){
  const l=DB.get('compromissos');
  const q=(byId('q-comp')?.value||'').toLowerCase(),fs=byId('f-comp-st')?.value||'';
  const rows=l.filter(c=>(!q||`${c.cidade} ${c.quem} ${c.pedido}`.toLowerCase().includes(q))&&(!fs||c.status===fs))
    .sort((a,b)=>(a.status==='aberto'?0:1)-(b.status==='aberto'?0:1)||(a.prazo||'9999').localeCompare(b.prazo||'9999'));
  const corSt=s=>s==='aberto'?'var(--bad)':s==='em andamento'?'var(--warn)':'var(--ok)';
  byId('tb-comp').innerHTML=`<table><thead><tr><th>Data</th><th>Cidade</th><th>Quem pediu</th><th>Pedido</th>
  <th>Compromisso assumido</th><th>Dono</th><th>Prazo</th><th>Status</th><th></th></tr></thead><tbody>
  ${rows.map(c=>`<tr><td class="mut">${dataBR(c.data)}</td><td><b>${esc(c.cidade)}</b></td><td>${esc(c.quem)}</td>
  <td style="white-space:normal;max-width:240px">${esc(c.pedido)}</td>
  <td style="white-space:normal;max-width:240px" class="mut">${esc(c.promessa||'—')}</td>
  <td>${esc(c.responsavel||'—')}</td>
  <td class="${c.prazo&&c.prazo<hoje()&&c.status!=='cumprido'&&c.status!=='retorno dado'?'neg':'mut'}">${dataBR(c.prazo)}</td>
  <td><select onchange="stComp('${c.id}',this.value)" style="border-color:${corSt(c.status)}">
  ${ST_COMP.map(s=>`<option ${c.status===s?'selected':''}>${s}</option>`).join('')}</select></td>
  <td><button class="b2" style="padding:3px 10px;font-size:12px" onclick="formComp('${c.id}')">editar</button>
  <button class="bd" onclick="delGen('compromissos','${c.id}',rComp)">×</button></td></tr>`).join('')}</tbody></table>
  <div class="mut" style="margin-top:6px">${rows.length} registros · ${l.filter(c=>c.status==='aberto').length} abertos.</div>`;
}
function formComp(id){
  const c=DB.get('compromissos').find(x=>x.id===id)||{};
  abrir(`<h2>${id?'Editar':'Novo'} compromisso</h2>
  <div class="grid3">
    <div class="fld"><label>Data do pedido *</label><input id="cp-data" type="date" value="${c.data||hoje()}"></div>
    <div class="fld"><label>Cidade *</label>${selCidade('cp-cidade',c.cidade)}</div>
    <div class="fld"><label>Quem pediu *</label><input id="cp-quem" value="${esc(c.quem||'')}" placeholder="prefeito, líder comunitário…"></div>
  </div>
  <div class="fld"><label>Pedido *</label><textarea id="cp-pedido">${esc(c.pedido||'')}</textarea></div>
  <div class="fld"><label>Compromisso assumido pelo candidato</label><textarea id="cp-promessa">${esc(c.promessa||'')}</textarea></div>
  <div class="grid2">

    <div class="fld"><label>Prazo de retorno</label><input id="cp-prazo" type="date" value="${c.prazo||''}"></div>
  </div>
  <button class="b" onclick="salvarComp('${id||''}')">Salvar</button>`);
}
function salvarComp(id){
  const v=k=>byId('cp-'+k).value.trim();
  if(!v('cidade')||!v('quem')||!v('pedido'))return alert('Cidade, quem pediu e pedido são obrigatórios.');
  const l=DB.get('compromissos');
  const novo={id:id||uid(),data:v('data'),cidade:v('cidade'),quem:v('quem'),pedido:v('pedido'),
    promessa:v('promessa'),responsavel:v('resp'),prazo:v('prazo'),status:id?(l.find(x=>x.id===id)?.status||'aberto'):'aberto'};
  const i=l.findIndex(x=>x.id===id);if(i>=0)l[i]=novo;else l.push(novo);
  DB.set('compromissos',l);fechar();rComp();rDash();
}
function stComp(id,s){const l=DB.get('compromissos');const c=l.find(x=>x.id===id);if(c){c.status=s;DB.set('compromissos',l);rCompTb();rDash();}}
function delGen(chave,id,rerender){if(!confirm('Remover?'))return;DB.set(chave,DB.get(chave).filter(x=>x.id!==id));rerender();rDash();}

/* ═══════════ Agenda do candidato ═══════════ */
function aniversariantes(dias){
  const hj=new Date();
  return DB.get('apoiadores').filter(a=>a.nasc).map(a=>{
    const [y,m,d]=a.nasc.split('-').map(Number);
    const prox=new Date(hj.getFullYear(),m-1,d);
    if(prox<new Date(hj.getFullYear(),hj.getMonth(),hj.getDate()))prox.setFullYear(hj.getFullYear()+1);
    const diff=Math.round((prox-hj)/864e5);
    return {a,diff,dia:`${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}`};
  }).filter(x=>x.diff<=dias).sort((a,b)=>a.diff-b.diff);
}

  <td><button class="bd" onclick="delGen('agenda','${e.id}',rAgenda)">×</button></td></tr>`).join('')}</tbody></table>`;

function salvarAgenda(){

    <div class="card"><div class="l">Documentos pendentes de assinatura</div><div class="v ${pendDocs?'neg':'pos'}">${pendDocs}</div>
    <div class="l">${docs.length} no total</div></div>
    <div class="card"><div class="l">Distribuições pendentes</div><div class="v">${dists.filter(d=>d.status!=='entregue').length}</div>
    <div class="l">${dists.length} no total</div></div>
    <div class="card"><div class="l">📌 Compromissos abertos</div>
    <div class="v ${DB.get('compromissos').filter(c=>c.status==='aberto').length?'neg':'pos'}">${DB.get('compromissos').filter(c=>c.status==='aberto').length}</div>
    <div class="l">${DB.get('compromissos').filter(c=>c.prazo&&c.prazo<hoje()&&!['cumprido','retorno dado'].includes(c.status)).length} com prazo vencido</div></div>
    <div class="card"><div class="l">📅 Agenda próximos 7 dias</div>
    <div class="v">${DB.get('agenda').filter(e=>e.data>=hoje()&&e.data<=new Date(Date.now()+7*864e5).toISOString().slice(0,10)&&e.status!=='cancelado').length}</div>
    <div class="l">${DB.get('agenda').filter(e=>e.data>=hoje()&&e.status==='a confirmar').length} a confirmar</div></div>
    <div class="card"><div class="l">🎂 Aniversários (7 dias)</div><div class="v">${aniversariantes(7).length}</div>
    <div class="l">${aniversariantes(0).length} hoje — ligar!</div></div>
    <div class="card"><div class="l">🚨 Crises em aberto</div>
    <div class="v ${DB.get('crises').filter(c=>!['encerrada'].includes(c.status)).length?'neg':'pos'}">${DB.get('crises').filter(c=>c.status!=='encerrada').length}</div></div>
  </div>
  ${semTermo?`<div class="aviso">⚠️ ${semTermo} carro(s) cedido(s) sem termo de cessão gerado — regularize antes do uso (risco na prestação de contas).</div>`:''}
  ${(()=>{const o=DB.obj('organograma');const vagas=FUNCOES_CENTRAIS.filter(f=>!(o.centrais||{})[f.id]);
    return vagas.length?`<div class="aviso">🧭 Funções centrais sem responsável: ${vagas.map(f=>f.nome).join(', ')} — preencha no Organograma.</div>`:'';})()}
  <div class="sub">Apoiadores por cidade (top 8)</div>
  <div class="card">${topCidades.map(([c,n])=>`<div style="display:grid;grid-template-columns:200px 1fr 40px;gap:10px;align-items:center;padding:2px 0">
  <span>${esc(c)}</span><div style="background:var(--ac);height:8px;border-radius:4px;width:${(n/topCidades[0][1]*100).toFixed(0)}%"></div>
  <span class="num mut">${n}</span></div>`).join('')||'<span class="mut">Cadastre apoiadores para ver o mapa de cobertura.</span>'}</div>
  <div class="sub">Checklist de conformidade (prestação de contas)</div>
  <div class="card" style="font-size:13.5px;line-height:2">
  ☐ Todo bem cedido (carro, sala, som) tem termo assinado e valor estimado registrado como doação estimável<br>
  ☐ Toda despesa tem NF ou recibo com CPF/CNPJ do fornecedor<br>
  ☐ Doações de PF respeitam o limite de 10% dos rendimentos do doador no ano anterior<br>
  ☐ Nenhuma doação de fonte vedada (CNPJ, concessionários, sindicatos — art. 24, Lei 9.504/97)<br>
  ☐ Gastos com combustível vinculados aos veículos com termo de cessão<br>
  ☐ Backup deste sistema feito após cada dia de lançamentos</div>`;
}
</script>
</body>
</html>
